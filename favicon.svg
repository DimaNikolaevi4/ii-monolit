<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#0a2040"/>
      <stop offset="100%" stop-color="#04080f"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="32" cy="30" rx="20" ry="22" fill="url(#halo)"/>

  <!-- Wireframe head + neck, all strokes glow-filtered -->
  <g filter="url(#glow)" stroke="#38bdf8" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- HEAD OUTLINE — simplified egg shape -->
    <path d="M32 7
             C22 7 16 14 16 23
             C16 33 20 40 26 43
             L26 46 L38 46 L38 43
             C44 40 48 33 48 23
             C48 14 42 7 32 7 Z"
          stroke-width="1.4"/>

    <!-- HORIZONTAL grid lines (5 lines across the face) -->
    <path d="M20 17 Q32 15 44 17"   stroke-width=".65" opacity=".7"/>
    <path d="M17.5 22 Q32 20 46.5 22" stroke-width=".65" opacity=".7"/>
    <path d="M16.5 27 Q32 25.5 47.5 27" stroke-width=".65" opacity=".65"/>
    <path d="M17 32 Q32 31 47 32"   stroke-width=".65" opacity=".6"/>
    <path d="M19 37 Q32 36 45 37"   stroke-width=".65" opacity=".55"/>

    <!-- VERTICAL grid lines (5 lines down the face) -->
    <path d="M23 8  L21 43"  stroke-width=".55" opacity=".6"/>
    <path d="M28 7  L27 44"  stroke-width=".55" opacity=".6"/>
    <path d="M32 7  L32 44"  stroke-width=".6"  opacity=".7"/>
    <path d="M36 7  L37 44"  stroke-width=".55" opacity=".6"/>
    <path d="M41 8  L43 43"  stroke-width=".55" opacity=".6"/>

    <!-- EYE SOCKETS — simple curves -->
    <path d="M21 24 Q24 22 27 24" stroke-width="1.0" opacity=".85"/>
    <path d="M37 24 Q40 22 43 24" stroke-width="1.0" opacity=".85"/>

    <!-- NOSE — minimal -->
    <path d="M30 28 L30 33 Q32 35 34 33 L34 28" stroke-width=".8" opacity=".7"/>

    <!-- MOUTH line -->
    <path d="M26 38 Q32 40 38 38" stroke-width=".85" opacity=".7"/>

    <!-- NECK -->
    <path d="M26 46 L26 50 M38 46 L38 50" stroke-width="1.2"/>

    <!-- SHOULDER stub -->
    <path d="M18 52 Q22 50 26 50 M38 50 Q42 50 46 52" stroke-width="1.1"/>

  </g>

  <!-- Bright core dots on eyes -->
  <circle cx="24" cy="24" r="1.1" fill="#7dd3fc" opacity=".9"/>
  <circle cx="40" cy="24" r="1.1" fill="#7dd3fc" opacity=".9"/>
</svg>
