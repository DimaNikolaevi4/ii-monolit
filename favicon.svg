<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Background circle glow -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0b1e3a"/>
      <stop offset="100%" stop-color="#060a11"/>
    </radialGradient>
    <!-- Figure glow -->
    <radialGradient id="figGlow" cx="50%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0e7fc0" stop-opacity="0"/>
    </radialGradient>
    <!-- Base glow circle -->
    <radialGradient id="baseGlow" cx="50%" cy="100%" r="40%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <!-- Wire stroke gradient -->
    <linearGradient id="wireGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="60%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0e7fc0"/>
    </linearGradient>
    <!-- Drop shadow / outer glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Ambient figure glow -->
  <ellipse cx="32" cy="28" rx="18" ry="22" fill="url(#figGlow)"/>

  <!-- Base holo-circle glow -->
  <ellipse cx="32" cy="56" rx="13" ry="3.5" fill="url(#baseGlow)"/>

  <!-- ── WIREFRAME FIGURE ── -->
  <g filter="url(#glow)" stroke="url(#wireGrad)" stroke-linecap="round" stroke-linejoin="round">

    <!-- HEAD -->
    <ellipse cx="32" cy="12.5" rx="5.5" ry="6" stroke-width="1.1" fill="none"/>
    <!-- head grid horizontal -->
    <path d="M26.6 11 Q32 9.5 37.4 11" stroke-width="0.55" fill="none" opacity="0.7"/>
    <path d="M26.6 14 Q32 15.5 37.4 14" stroke-width="0.55" fill="none" opacity="0.7"/>
    <!-- head grid vertical -->
    <path d="M32 6.5 L32 18.5" stroke-width="0.55" fill="none" opacity="0.7"/>
    <path d="M28 7.5 L27.5 18" stroke-width="0.45" fill="none" opacity="0.5"/>
    <path d="M36 7.5 L36.5 18" stroke-width="0.45" fill="none" opacity="0.5"/>

    <!-- NECK -->
    <path d="M30 18.5 L30 21.5 M34 18.5 L34 21.5" stroke-width="0.9" fill="none"/>

    <!-- TORSO outline -->
    <path d="M23 22 Q20 24 20 30 L20 45 Q20 47 22 47 L42 47 Q44 47 44 45 L44 30 Q44 24 41 22 Z"
          stroke-width="1.1" fill="rgba(56,189,248,0.04)"/>

    <!-- TORSO horizontal grid lines -->
    <path d="M20.5 27 L43.5 27" stroke-width="0.5" fill="none" opacity="0.55"/>
    <path d="M20.5 32 L43.5 32" stroke-width="0.5" fill="none" opacity="0.55"/>
    <path d="M20.5 37 L43.5 37" stroke-width="0.5" fill="none" opacity="0.55"/>
    <path d="M20.5 42 L43.5 42" stroke-width="0.5" fill="none" opacity="0.55"/>

    <!-- TORSO vertical grid lines -->
    <path d="M26 22.5 L26 47" stroke-width="0.5" fill="none" opacity="0.55"/>
    <path d="M32 22 L32 47" stroke-width="0.5" fill="none" opacity="0.55"/>
    <path d="M38 22.5 L38 47" stroke-width="0.5" fill="none" opacity="0.55"/>

    <!-- LEFT ARM -->
    <path d="M20 23 Q15 26 13 32 Q12 36 14 40" stroke-width="1.0" fill="none"/>
    <path d="M14.5 34 Q16 30 19 27" stroke-width="0.5" fill="none" opacity="0.55"/>
    <path d="M13.5 38 Q15 35 18 32" stroke-width="0.5" fill="none" opacity="0.55"/>

    <!-- RIGHT ARM (outstretched / pointing) -->
    <path d="M44 23 Q49 26 52 31 Q54 35 52 39" stroke-width="1.0" fill="none"/>
    <path d="M49.5 28 Q47 30 44.5 32" stroke-width="0.5" fill="none" opacity="0.55"/>
    <path d="M51.5 34 Q49 36 46 38" stroke-width="0.5" fill="none" opacity="0.55"/>
    <!-- pointing hand dot -->
    <circle cx="52.5" cy="39.5" r="1.2" fill="#38bdf8" opacity="0.9"/>

    <!-- HOLO BASE RING -->
    <ellipse cx="32" cy="53" rx="10" ry="2.5" stroke-width="1.0" stroke="#38bdf8" fill="rgba(56,189,248,0.06)" opacity="0.8"/>
    <ellipse cx="32" cy="53" rx="6.5" ry="1.5" stroke-width="0.6" stroke="#7dd3fc" fill="none" opacity="0.55"/>

    <!-- CHEST center dot (core energy) -->
    <circle cx="32" cy="33" r="1.8" fill="#38bdf8" opacity="0.5" stroke="none"/>
    <circle cx="32" cy="33" r="1.0" fill="#bae6fd" opacity="0.85" stroke="none"/>
  </g>

  <!-- Extra soft glow on top of figure -->
  <ellipse cx="32" cy="26" rx="10" ry="14" fill="rgba(56,189,248,0.06)" filter="url(#glowSoft)"/>
</svg>
